<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GEO-CO0ODE | 018810</title>
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; overflow: hidden; }
        canvas { display: block; image-rendering: pixelated; width: 100vw; height: 100vh; }
        .hud { position: absolute; top: 15px; left: 15px; border: 1px solid #00ff41; background: rgba(0,0,0,0.9); padding: 12px; pointer-events: none; width: 250px; }
    </style>
</head>
<body>
    <div class="hud">
        SYSTEM: 018810_MIRROR_CORE<br>
        INPUT: 8-BIT HEX STRANDS<br>
        STATUS: <span id="status">IDLE</span>
    </div>
    <canvas id="canvas"></canvas>

<script type="module">
    import Orchestrator, { Audio, Acceptor, Storage } from './engine/engine.js';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    let emIntensity = 0;

    window.addEventListener('geo-sync', (e) => {
        emIntensity = e.detail;
        document.getElementById('status').textContent = emIntensity > 5 ? 'EM_ACTIVE' : 'STABLE';
    });

    async function boot() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        await Audio.init();
        Orchestrator.init();

        window.addEventListener('keydown', (e) => {
            Acceptor.process(e.key, (strand) => Orchestrator.typewrite(strand));
        });

        draw();
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cw = canvas.width / 30, ch = canvas.height / 32;
        const jitter = emIntensity * 0.15;

        Orchestrator.nodes.forEach((n, i) => {
            if (n.value > 0 || n.isPivot) {
                const x = (i % 30) * cw, y = Math.floor(i / 30) * ch;
                
                // Color mapping: Pivot Red, Data Cyan
                ctx.fillStyle = n.isPivot ? '#ff0041' : `rgba(0, 240, 255, ${n.value/255})`;
                ctx.fillRect(x + (Math.random() * jitter), y, cw - 1, ch - 1);

                // Highlight Typewriter Head
                if (i === Orchestrator.cursor) {
                    ctx.strokeStyle = '#fff';
                    ctx.strokeRect(x, y, cw - 1, ch - 1);
                }
            }
        });
        requestAnimationFrame(draw);
    }

    boot();
</script>
</body>
</html>
