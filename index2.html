<!DOCTYPE html>  
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>geoco0ode</title>
    <script>
        const manifest = {
            "name": "geoco0ode_V1",
            "short_name": "o0o_V1",
            "start_url": ".",
            "display": "standalone, fullscreen",
            "orientation": "portrait"
            "background_color": "#050505",
            "theme_color": "#d0f8d0"
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');
        :root {
            --neon-cyan: #00ffcc; --neon-magenta: #ff00cc; --neon-orange: #ff6600;
            --neon-yellow: #FFFF00; --neon-green: #00ff88;
            --bg-dark: #050505; --panel-bg: #d0f8d0; --console-gray: #cfcfcf; --text-on-light: #0a2e0a;
        }
        body { margin: 0; padding: 0; overflow: hidden; touch-action: none; background: var(--bg-dark); font-family: 'IBM Plex Mono', monospace; color: #e0e0e0; }
        #appRoot { display: flex; width: 100vw; height: 100vh; flex-direction: column; }
        .canary-border { border: 1px solid var(--neon-yellow); box-shadow: 0 0 8px var(--neon-yellow); }
        #sidebarEl { width: 100%; height: auto; background: var(--panel-bg); display: flex; flex-direction: row; padding: 10px; gap: 10px; overflow-x: auto; color: var(--text-on-light); flex-shrink: 0; }
        #mainEl { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #headerEl { height: 40px; background: var(--panel-bg); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; color: var(--text-on-light); font-size: 12px; font-weight: bold; }
        #canvasCtn { flex-grow: 1; position: relative; background: #000; }
        #bottomPanel { height: 200px; background: var(--panel-bg); border-top: 2px solid var(--neon-yellow); display: flex; flex-direction: column; color: var(--text-on-light); }
        #bottomToolbar { height: 60px; display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(0,0,0,0.05); }
        #logPanelEl { flex: 1; overflow-y: auto; padding: 10px; font-size: 10px; background: var(--console-gray); color: #333; }
        .square-btn { width: 44px; height: 44px; border-radius: 8px; background: #fff; border: 2px solid var(--neon-yellow); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .telemetry-mini { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 4px; border: 1px solid var(--neon-yellow); font-size: 10px; width: 140px; pointer-events: none; z-index: 10; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
    </style>
</head>
<body>
<div id="appRoot">
    <nav id="sidebarEl">
        <div style="font-weight:bold; min-width:120px;">geoco0ode_V1</div>
        <div id="eqBars" style="display:flex; align-items:flex-end; gap:2px; height:30px; flex-grow:1;"></div>
    </nav>
    <main id="mainEl">
        <header id="headerEl" class="canary-border">
            
            <span id="mirrorStatus" style="color:var(--neon-magenta)">0oo0,o00o,0o0,o0o,o0,0o,0|0,o0,0o,o0o,0o0,o00o,0oo0</span>
        </header>
        <div id="canvasCtn">
            <div class="telemetry-mini">
                <div class="data-row"><span>NODES</span> <span id="nodeCount" style="color:var(--neon-green);">0</span></div>
                <div class="data-row"><span>RATIO</span> <span id="ratioEl" style="color:var(--neon-magenta);">3000:1</span></div>
                <div class="data-row"><span>HITS</span> <span id="hitsEl">0</span></div>
            </div>
        </div>
        <div id="bottomPanel">
            <div id="bottomToolbar">
                <button id="bPulse" class="square-btn">⚡</button>
                <button id="bRandom" class="square-btn">🎲</button>
                <button id="bClear" class="square-btn">🔄</button>
                <button id="bMic" class="square-btn">🎤</button>
                <button id="bSave" class="square-btn">💾</button>
            </div>
            <div id="logPanelEl"></div>
        </div>
    </main>
</div>

<script type="module">
    import * as THREE from 'https://esm.sh/three@0.177.0';
    import { OrbitControls } from 'https://esm.sh/three@0.177.0/examples/jsm/controls/OrbitControls.js';

    let scene, camera, renderer, controls, gridMesh, dummy = new THREE.Object3D();
    let audioCtx, analyser, dataArray, hits = 0;
    const TOTAL = 200, geoGrid = [];

    function log(msg) {
        const div = document.createElement('div');
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        const logPanel = document.getElementById('logPanelEl');
        logPanel.appendChild(div);
        logPanel.scrollTop = logPanel.scrollHeight;
    }

    function init() {
        const container = document.getElementById('canvasCtn');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.z = 40;
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        controls = new OrbitControls(camera, renderer.domElement);

        // Build 018810 Mirror Grid
        const phi = Math.PI * (3 - Math.sqrt(5));
        for (let i = 0; i < TOTAL; i++) {
            const y = 1 - (i / (TOTAL - 1)) * 2;
            const r = Math.sqrt(1 - y * y);
            const theta = phi * i;
            const dist = i < 100 ? 14 : 7; // Outer (14) vs Inner (7)
            geoGrid.push({
                pos: new THREE.Vector3(Math.cos(theta) * r * dist, y * dist, Math.sin(theta) * r * dist),
                value: 0,
                type: i < 100 ? 'outer' : 'inner'
            });
        }

        gridMesh = new THREE.InstancedMesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshPhongMaterial({ color: 0xffffff }), TOTAL);
        scene.add(gridMesh);
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        
        updateAllNodes();
        animate();
        setupInteractions();
    }

    function updateAllNodes() {
        geoGrid.forEach((n, i) => {
            dummy.position.copy(n.pos);
            dummy.lookAt(0,0,0);
            const s = n.value > 0 ? 1.5 : 1.0;
            dummy.scale.set(s,s,s);
            dummy.updateMatrix();
            gridMesh.setMatrixAt(i, dummy.matrix);
            gridMesh.setColorAt(i, n.value === 8 ? new THREE.Color(0xff00cc) : (n.value === 1 ? new THREE.Color(0x00ffcc) : new THREE.Color(0x222222)));
        });
        gridMesh.instanceMatrix.needsUpdate = true;
        if (gridMesh.instanceColor) gridMesh.instanceColor.needsUpdate = true;
        
        const active = geoGrid.filter(n => n.value > 0).length;
        document.getElementById('nodeCount').innerText = active;
        document.getElementById('ratioEl').innerText = active > 0 ? `1:${active * 3000}` : "3000:1";
    }

    function setupInteractions() {
        document.getElementById('bRandom').onclick = () => {
            geoGrid.forEach(n => n.value = Math.random() > 0.9 ? 1 : 0);
            log("018810: Entropy Sync");
            updateAllNodes();
        };
        document.getElementById('bClear').onclick = () => {
            geoGrid.forEach(n => n.value = 0);
            hits = 0; document.getElementById('hitsEl').innerText = "0";
            log("System: Zero State");
            updateAllNodes();
        };
        document.getElementById('bPulse').onclick = () => {
            geoGrid.forEach(n => { if(n.value > 0) n.value = n.value === 1 ? 8 : 1; });
            log("Pulse: V-Vector Shift");
            updateAllNodes();
        };
        document.getElementById('bMic').onclick = async () => {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                analyser = audioCtx.createAnalyser();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx.createMediaStreamSource(stream).connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                log("Audio: MIC_LOCKED");
            }
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        if (analyser) {
            analyser.getByteFrequencyData(dataArray);
            if (dataArray[0] > 150) { // Bass Kick
                const idx = Math.floor(Math.random() * 200);
                geoGrid[idx].value = 8;
                hits++; document.getElementById('hitsEl').innerText = hits;
                updateAllNodes();
            }
        }
        renderer.render(scene, camera);
    }

    window.addEventListener('load', init);

    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => e.waitUntil(caches.open('v9').then(c => c.addAll(['./', 'https://esm.sh/three@0.177.0']))));
            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>
</body>
</html>
